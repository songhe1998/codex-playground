<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny Vite Site</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Georgia, "Times New Roman", serif;
        background: #f6f1e8;
        color: #1f1a17;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(207, 165, 89, 0.22), transparent 36%),
          linear-gradient(180deg, #fbf7f0 0%, #efe5d6 100%);
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        padding: 2rem;
        border-radius: 1.25rem;
        background: rgba(255, 252, 247, 0.92);
        box-shadow: 0 1.25rem 3rem rgba(65, 43, 21, 0.12);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 4vw, 2.8rem);
      }

      p {
        margin: 0 0 1.25rem;
        line-height: 1.6;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1.1rem;
        font: inherit;
        color: #fffdf9;
        background: #9c5d22;
        cursor: pointer;
        transition: transform 140ms ease, background-color 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        background: #7f4a19;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Small site, one page.</h1>
      <p id="message">This is a tiny Vite app with plain JavaScript and one simple button.</p>
      <button id="toggle" type="button">Press me</button>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
